syntax = "proto3";
package finance.v1;
option go_package = "github.com/samsonnaze5/aeternixth-go-lib/finance/v1;financev1";

// PSP config resolved by CRM, passed per-request
message PspConfig {
  string provider_code = 1;
  string method_type = 2;
  string payment_currency = 3;
  map<string, string> metadata = 4;
}

// --- Deposit ---
message CreateDepositRequest {
  string user_id = 1;
  string dest_type = 2;      // TRADING | WALLET
  string dest_id = 3;
  string amount_usd = 4;
  string offer_rate = 5;
  string payment_amount = 6;
  PspConfig psp_config = 7;
  string idempotency_key = 8;
  int64 mt5_login = 9;
  string expires_at = 10;
}

message CreateDepositResponse {
  string txn_id = 1;
  string reference_id = 2;
  string qr_code_base64 = 3;
  string payment_url = 4;
  string psp_transaction_id = 5;
  string status = 6;
}

// --- Withdraw ---
message CreateWithdrawRequest {
  string user_id = 1;
  string source_type = 2;
  string source_id = 3;
  string amount_usd = 4;
  string bid_rate = 5;
  string payout_amount = 6;
  string payment_currency = 7;
  PspConfig psp_config = 8;
  string idempotency_key = 9;
  int64 mt5_login = 10;
  string expires_at = 11;
}

message CreateWithdrawResponse {
  string txn_id = 1;
  string reference_id = 2;
  string status = 3;
}

message ApproveWithdrawRequest {
  string txn_id = 1;
  string admin_id = 2;
}

message ApproveWithdrawResponse {
  string status = 1;          // COMPLETED | PROCESSING | FAILED
  string psp_transaction_id = 2;
  string error_message = 3;
}

message RejectWithdrawRequest {
  string txn_id = 1;
  string admin_id = 2;
  string reason = 3;
}

message RefundWithdrawRequest {
  string txn_id = 1;
  string admin_id = 2;
  string reason = 3;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

// --- Internal Transfer ---
message CreateTransferRequest {
  string user_id = 1;
  string source_type = 2;
  string source_id = 3;
  string dest_type = 4;
  string dest_id = 5;
  string amount_usd = 6;
  string idempotency_key = 7;
}

message CreateTransferResponse {
  string txn_id = 1;
  string status = 2;
}

// --- Service ---
service FinanceService {
  rpc CreateDeposit(CreateDepositRequest) returns (CreateDepositResponse);
  rpc CreateWithdraw(CreateWithdrawRequest) returns (CreateWithdrawResponse);
  rpc ApproveWithdraw(ApproveWithdrawRequest) returns (ApproveWithdrawResponse);
  rpc RejectWithdraw(RejectWithdrawRequest) returns (StatusResponse);
  rpc RefundWithdraw(RefundWithdrawRequest) returns (StatusResponse);
  rpc CreateTransfer(CreateTransferRequest) returns (CreateTransferResponse);
}
