syntax = "proto3";
package finance.v1;
option go_package = "github.com/samsonnaze5/aeternixth-go-lib/finance/v1;financev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// --- Shared Enums ---

enum AccountType {
  ACCOUNT_TYPE_UNSPECIFIED = 0;
  TRADING = 1;
  WALLET = 2;
}

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  APPROVED = 2;
  PROCESSING = 3;
  COMPLETED = 4;
  FAILED = 5;
  CANCELLED = 6;
  EXPIRED = 7;
  REJECTED = 8;
  REFUNDED = 9;
}

// PSP config resolved by CRM, passed per-request
message PspConfig {
  string provider_code = 1;
  string method_type = 2;
  string payment_currency = 3;
  map<string, string> metadata = 4;
}

// --- Deposit ---
message CreateDepositRequest {
  string user_id = 1;
  AccountType dest_type = 2;
  string dest_id = 3;
  string amount_usd = 4;
  string offer_rate = 5;
  string payment_amount = 6;
  PspConfig psp_config = 7;
  string idempotency_key = 8;
  int64 mt5_login = 9;
  google.protobuf.Timestamp expires_at = 10;
}

message CreateDepositResponse {
  string txn_id = 1;
  string reference_id = 2;
  string qr_code_base64 = 3;
  string payment_url = 4;
  string psp_transaction_id = 5;
  TransactionStatus status = 6;
}

// --- Withdraw ---
message CreateWithdrawRequest {
  string user_id = 1;
  AccountType source_type = 2;
  string source_id = 3;
  string amount_usd = 4;
  string bid_rate = 5;
  string payout_amount = 6;
  string payment_currency = 7;
  PspConfig psp_config = 8;
  string idempotency_key = 9;
  int64 mt5_login = 10;
  google.protobuf.Timestamp expires_at = 11;
}

message CreateWithdrawResponse {
  string txn_id = 1;
  string reference_id = 2;
  TransactionStatus status = 3;
}

message ApproveWithdrawRequest {
  string txn_id = 1;
  string admin_id = 2;
}

message ApproveWithdrawResponse {
  TransactionStatus status = 1;
  string psp_transaction_id = 2;
}

message RejectWithdrawRequest {
  string txn_id = 1;
  string admin_id = 2;
  string reason = 3;
}

message RefundWithdrawRequest {
  string txn_id = 1;
  string admin_id = 2;
  string reason = 3;
}

// --- Internal Transfer ---
message CreateTransferRequest {
  string user_id = 1;
  AccountType source_type = 2;
  string source_id = 3;
  AccountType dest_type = 4;
  string dest_id = 5;
  string amount_usd = 6;
  string idempotency_key = 7;
}

message CreateTransferResponse {
  string txn_id = 1;
  TransactionStatus status = 2;
}

// --- Service ---
service FinanceService {
  rpc CreateDeposit(CreateDepositRequest) returns (CreateDepositResponse);
  rpc CreateWithdraw(CreateWithdrawRequest) returns (CreateWithdrawResponse);
  rpc ApproveWithdraw(ApproveWithdrawRequest) returns (ApproveWithdrawResponse);
  rpc RejectWithdraw(RejectWithdrawRequest) returns (google.protobuf.Empty);
  rpc RefundWithdraw(RefundWithdrawRequest) returns (google.protobuf.Empty);
  rpc CreateTransfer(CreateTransferRequest) returns (CreateTransferResponse);
}
