version: "3"

tasks:
  fmt:
    desc: Format all Go files in the project with gofmt
    cmds:
      - gofmt -w .
    silent: false

  imports:
    desc: Organize imports for all Go files in the project with goimports
    cmds:
      - goimports -w .
    silent: false

  format:
    desc: Format and organize imports for all Go files in the project
    deps:
      - fmt
      - imports
    silent: false

  proto:gen:
    desc: Generate Go code from protobuf files
    cmds:
      - find proto -name "*.proto" | xargs protoc --go_out=.
        --go_opt=paths=source_relative --go-grpc_out=.
        --go-grpc_opt=paths=source_relative
    silent: false

  release:patch:
    desc: Bump patch version, tag and push (v0.1.0 → v0.1.1)
    cmds:
      - |
        LATEST=$(git tag --sort=-v:refname | head -n 1)
        if [ -z "$LATEST" ]; then
          NEXT="v0.0.1"
        else
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
        fi
        echo "📦 ${LATEST:-none} → ${NEXT}"
        git tag "$NEXT"
        git push origin "$NEXT"
        echo "✅ Released ${NEXT}"

  release:minor:
    desc: Bump minor version, tag and push (v0.1.0 → v0.2.0)
    cmds:
      - |
        LATEST=$(git tag --sort=-v:refname | head -n 1)
        if [ -z "$LATEST" ]; then
          NEXT="v0.1.0"
        else
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          NEXT="v${MAJOR}.$((MINOR + 1)).0"
        fi
        echo "📦 ${LATEST:-none} → ${NEXT}"
        git tag "$NEXT"
        git push origin "$NEXT"
        echo "✅ Released ${NEXT}"

  release:major:
    desc: Bump major version, tag and push (v0.1.0 → v1.0.0)
    cmds:
      - |
        LATEST=$(git tag --sort=-v:refname | head -n 1)
        if [ -z "$LATEST" ]; then
          NEXT="v1.0.0"
        else
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          NEXT="v$((MAJOR + 1)).0.0"
        fi
        echo "📦 ${LATEST:-none} → ${NEXT}"
        git tag "$NEXT"
        git push origin "$NEXT"
        echo "✅ Released ${NEXT}"
